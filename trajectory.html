<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/base.css">

<link rel="stylesheet" href="assets/css/trajectory.css">
</head>
<body>
<div class="wrap">
  <nav class="nav" id="site-nav"></nav>
  <script src="assets/js/chrome.js"></script>

  <div class="mast">
    <div class="kicker" id="mastcat"></div>
    <h1 id="mastname"></h1>
    <div class="kicker" style="text-align:right" id="dateline"></div>
  </div>

  <div class="headline">
    <h2 id="hl"></h2>
  </div>

  <div class="board" id="board"></div>

  <div class="metrics" id="metrics"></div>

  <div class="sech">
    <span>Match thread</span>
    <span class="filt">
      <button data-f="all" class="on">everything</button>
      <button data-f="think">thoughts only</button>
      <button data-f="event">flag events</button>
    </span>
  </div>

  <div class="threadwrap">
    <div class="chat" id="chat"></div>
    <div class="minis" title="Per-team minimap — click or drag to scrub">
      <div class="minimap" data-team="team1">
        <div class="mm-head" id="mmh1"></div>
        <div class="mm-body"><div class="marks"></div><div class="mm-view"></div></div>
      </div>
      <div class="minimap" data-team="team2">
        <div class="mm-head" id="mmh2"></div>
        <div class="mm-body"><div class="marks"></div><div class="mm-view"></div></div>
      </div>
    </div>
  </div>
  <div class="mm-legend" id="mmlegend"></div>

  <footer class="footer" id="site-footer"></footer>
</div>
<script type="module" src="assets/js/trajectory.js"></script>
</body>
</html>
